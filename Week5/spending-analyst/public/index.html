<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소비 분석가</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <!-- ⚠️ CDN 버전 고정. @babel/standalone 은 반드시 v7 (8.x 는 text/babel 인라인 변환을 깨뜨림). -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  <style>
    :root { font-family: 'Inter', 'Gowun Dodum', system-ui, sans-serif; }
    body { font-family: 'Inter', 'Gowun Dodum', system-ui, sans-serif; background: #000; color: #ededed; overflow-x: hidden; }
    .glow { position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(120% 60% at 50% -28%, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.05) 26%, rgba(255,255,255,0) 52%); }
    .grid-marks { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .5;
      background-image: linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 64px 64px; mask-image: radial-gradient(120% 90% at 50% 0%, #000 0%, transparent 75%);
      -webkit-mask-image: radial-gradient(120% 90% at 50% 0%, #000 0%, transparent 75%); }
    .card { background: rgba(13,13,13,.92); border: 1px solid #242424; border-radius: 14px; }
    .tracking-wider2 { letter-spacing: .12em; }
    input, textarea { color-scheme: dark; }
    .dot { width:6px;height:6px;border-radius:50%;background:#888;display:inline-block;animation:b 1s infinite ease-in-out; }
    .dot:nth-child(2){animation-delay:.15s} .dot:nth-child(3){animation-delay:.3s}
    @keyframes b { 0%,80%,100%{opacity:.25} 40%{opacity:1} }
    ::-webkit-scrollbar { width: 10px; } ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="grid-marks"></div>
  <div id="root" style="position:relative;z-index:1"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useRef, useEffect } = React;

    const EXAMPLES = [
      '이번 달 지출이 가장 큰 카테고리 3개 알려줘',
      '지난 몇 달 동안 식비가 늘었어 줄었어?',
      '월별 평균 지출이 얼마야?',
      '구독료에 매달 얼마 쓰고 있어?',
      '수입 대비 지출 비율이 어때?',
    ];

    async function api(question) {
      const res = await fetch('/api/ask', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `요청 실패 (${res.status})`);
      return data;
    }

    function Msg({ m }) {
      if (m.role === 'user') {
        return (
          <div className="flex justify-end">
            <div className="card px-4 py-2.5 max-w-[80%] bg-white text-black border-white rounded-2xl rounded-br-sm">
              {m.text}
            </div>
          </div>
        );
      }
      return (
        <div className="flex justify-start">
          <div className="max-w-[88%] w-full">
            <div className="card px-4 py-3 whitespace-pre-wrap leading-relaxed text-neutral-100">{m.text}</div>
            {m.steps && m.steps.length > 0 && (
              <details className="mt-1 text-xs text-neutral-500">
                <summary className="cursor-pointer hover:text-neutral-300">조회한 SQL {m.steps.length}건</summary>
                <div className="mt-1 space-y-1">
                  {m.steps.map((s, i) => (
                    <div key={i} className="card px-3 py-2 font-mono text-[11px] text-neutral-400 overflow-x-auto">
                      <div>{s.sql}</div>
                      <div className="text-neutral-600 mt-0.5">{s.error ? `오류: ${s.error}` : `→ ${s.rowCount}행`}</div>
                    </div>
                  ))}
                </div>
              </details>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [msgs, setMsgs] = useState([]);
      const [q, setQ] = useState('');
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState('');
      const endRef = useRef(null);

      useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs, loading]);

      const send = async (text) => {
        const question = (text ?? q).trim();
        if (!question || loading) return;
        setErr(''); setQ('');
        setMsgs((m) => [...m, { role: 'user', text: question }]);
        setLoading(true);
        try {
          const { answer, steps } = await api(question);
          setMsgs((m) => [...m, { role: 'assistant', text: answer, steps }]);
        } catch (e) {
          setErr(e.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="max-w-2xl mx-auto px-4 py-10 min-h-screen flex flex-col">
          <header className="mb-6">
            <div className="text-[11px] uppercase tracking-wider2 text-neutral-500 mb-1">SPENDING ANALYST</div>
            <h1 className="text-3xl font-extrabold tracking-tight text-white">소비 분석가</h1>
            <p className="text-sm text-neutral-500 mt-1">가계부(Supabase) 데이터를 보고 말로 물어보면 분석해줍니다.</p>
          </header>

          {msgs.length === 0 && (
            <div className="card p-5 mb-4">
              <div className="text-sm text-neutral-400 mb-3">이렇게 물어보세요</div>
              <div className="flex flex-wrap gap-2">
                {EXAMPLES.map((e) => (
                  <button key={e} onClick={() => send(e)}
                    className="text-sm px-3 py-1.5 rounded-full bg-neutral-950 border border-neutral-800 text-neutral-300 hover:border-neutral-500 transition">
                    {e}
                  </button>
                ))}
              </div>
            </div>
          )}

          <div className="flex-1 space-y-3 mb-4">
            {msgs.map((m, i) => <Msg key={i} m={m} />)}
            {loading && (
              <div className="flex justify-start">
                <div className="card px-4 py-3 text-neutral-400 text-sm">
                  데이터 조회 · 분석 중 <span className="dot ml-1"></span><span className="dot"></span><span className="dot"></span>
                </div>
              </div>
            )}
            <div ref={endRef} />
          </div>

          {err && <div className="mb-3 rounded-xl border border-neutral-700 bg-neutral-900 text-neutral-200 px-4 py-3 text-sm">{err}</div>}

          <form onSubmit={(e) => { e.preventDefault(); send(); }} className="sticky bottom-4">
            <div className="card flex items-center gap-2 p-2">
              <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="예: 이번 달 지출 어디에 제일 많이 썼어?"
                className="flex-1 bg-transparent outline-none px-3 py-2 text-sm text-neutral-100 placeholder-neutral-600" />
              <button type="submit" disabled={loading || !q.trim()}
                className="px-4 py-2 rounded-xl font-semibold bg-white text-black hover:bg-neutral-200 disabled:opacity-40 transition">
                물어보기
              </button>
            </div>
          </form>

          <footer className="text-center text-[11px] uppercase tracking-wider2 text-neutral-700 mt-6">
            Claude + Supabase · 읽기 전용 SQL 조회
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
