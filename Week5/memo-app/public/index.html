<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메모장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Gowun+Dodum&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <!-- ⚠️ 모든 CDN 버전 고정. @babel/standalone 은 반드시 v7 (8.x 는 text/babel 인라인 변환을 깨뜨림). -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  <style>
    /* ===== 몽환적 파스텔 홀로그래픽 구름 테마 ===== */
    :root {
      font-family: 'Quicksand', 'Gowun Dodum', system-ui, sans-serif;
    }
    body {
      font-family: 'Quicksand', 'Gowun Dodum', system-ui, sans-serif;
      min-height: 100vh;
      /* 다층 파스텔 무지개 하늘: 스카이 베이스 + 라벤더/핑크/피치/민트/옐로우 블롭 */
      background:
        radial-gradient(60% 50% at 12% 18%, rgba(255, 209, 232, 0.75) 0%, rgba(255, 209, 232, 0) 60%),
        radial-gradient(55% 45% at 88% 12%, rgba(214, 200, 255, 0.75) 0%, rgba(214, 200, 255, 0) 60%),
        radial-gradient(50% 50% at 78% 82%, rgba(255, 226, 196, 0.7) 0%, rgba(255, 226, 196, 0) 60%),
        radial-gradient(55% 55% at 18% 88%, rgba(196, 245, 223, 0.7) 0%, rgba(196, 245, 223, 0) 62%),
        radial-gradient(45% 40% at 50% 45%, rgba(255, 248, 204, 0.55) 0%, rgba(255, 248, 204, 0) 60%),
        linear-gradient(180deg, #cfeaff 0%, #e3e8ff 45%, #ffe6f3 100%);
      background-attachment: fixed;
    }

    /* 배경에 떠다니는 흐릿한 파스텔 구름 블롭 */
    .cloud-blob {
      position: fixed;
      border-radius: 9999px;
      filter: blur(60px);
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
      will-change: transform;
    }
    .blob-1 { width: 42vw; height: 42vw; top: -8vw; left: -6vw;  background: #ffc8e4; animation: drift 22s ease-in-out infinite; }
    .blob-2 { width: 38vw; height: 38vw; top: 5vw;  right: -8vw; background: #cdbcff; animation: drift 27s ease-in-out infinite reverse; }
    .blob-3 { width: 34vw; height: 34vw; bottom: -10vw; left: 12vw; background: #bdf3da; animation: drift 30s ease-in-out infinite; }
    .blob-4 { width: 30vw; height: 30vw; bottom: 2vw; right: 6vw; background: #ffe2b8; animation: drift 24s ease-in-out infinite reverse; }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(2.5vw, -2vw) scale(1.06); }
      100% { transform: translate(0, 0) scale(1); }
    }

    /* 홀로그래픽 그라데이션 텍스트 */
    .holo-text {
      background: linear-gradient(110deg, #ff9ecd, #b79bff 35%, #7fc7ff 65%, #9af0c8);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: holoshift 8s ease-in-out infinite;
    }
    @keyframes holoshift {
      0%, 100% { background-position: 0% center; }
      50%      { background-position: 100% center; }
    }

    /* 무지개 파스텔 그라데이션 버튼 */
    .holo-btn {
      background: linear-gradient(120deg, #ffb3d9, #c8b6ff 50%, #a7d8ff);
      background-size: 180% auto;
      color: #5b4b7a;
      box-shadow: 0 8px 22px -8px rgba(180, 150, 230, 0.65);
      transition: background-position .5s ease, transform .25s ease, box-shadow .25s ease;
    }
    .holo-btn:hover:not(:disabled) {
      background-position: right center;
      transform: translateY(-1px);
      box-shadow: 0 12px 28px -8px rgba(160, 130, 240, 0.8), 0 0 18px rgba(200, 182, 255, 0.5);
    }
    .holo-btn-danger {
      background: linear-gradient(120deg, #ffc0cb, #ffb0c6 50%, #ffd6c2);
      background-size: 180% auto;
      color: #9a4a5a;
      box-shadow: 0 8px 20px -8px rgba(255, 160, 180, 0.6);
      transition: background-position .5s ease, transform .25s ease, box-shadow .25s ease;
    }
    .holo-btn-danger:hover:not(:disabled) {
      background-position: right center;
      transform: translateY(-1px);
      box-shadow: 0 12px 26px -8px rgba(255, 140, 170, 0.75), 0 0 16px rgba(255, 190, 205, 0.5);
    }

    /* 글래스모피즘 카드 */
    .glass {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 16px 40px -16px rgba(150, 140, 200, 0.45), inset 0 1px 0 rgba(255,255,255,0.7);
    }
    .glass-soft {
      background: rgba(255, 255, 255, 0.42);
      backdrop-filter: blur(14px) saturate(150%);
      -webkit-backdrop-filter: blur(14px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.55);
    }
    /* 카드 hover 시 살짝 떠오름 */
    .card-float { transition: transform .3s ease, box-shadow .3s ease; }
    .card-float:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 50px -18px rgba(150, 140, 200, 0.55), inset 0 1px 0 rgba(255,255,255,0.8);
    }

    /* 반투명 입력창 */
    .glass-input {
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.7);
      transition: box-shadow .25s ease, background .25s ease, border-color .25s ease;
    }
    .glass-input::placeholder { color: #9c93b8; }
    .glass-input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.72);
      border-color: rgba(199, 182, 255, 0.9);
      box-shadow: 0 0 0 4px rgba(199, 182, 255, 0.35), 0 0 16px rgba(199, 182, 255, 0.3);
    }
    .glass-input.has-error { border-color: rgba(255, 150, 175, 0.9); }
    .glass-input.has-error:focus { box-shadow: 0 0 0 4px rgba(255, 170, 190, 0.4); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.7s linear infinite; }

    /* 로딩 상태용 은은한 펄스 */
    @keyframes softpulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
    .soft-pulse { animation: softpulse 2s ease-in-out infinite; }

    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- 배경 떠다니는 파스텔 구름 블롭 -->
  <div class="cloud-blob blob-1"></div>
  <div class="cloud-blob blob-2"></div>
  <div class="cloud-blob blob-3"></div>
  <div class="cloud-blob blob-4"></div>

  <div id="root" style="position: relative; z-index: 1;"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ========================================
    // ⚙️ 설정 & 유틸
    // ========================================
    const API_BASE_URL = '/api';

    // created_at(ISO) → "2026년 6월 23일 14:30"
    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 ` +
             `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    // ========================================
    // 🎨 디자인 시스템 컴포넌트 (몽환 파스텔 홀로그래픽)
    // ========================================
    function Button({ variant = 'primary', size = 'md', disabled, onClick, type = 'button', className = '', children }) {
      const base = 'inline-flex items-center justify-center font-semibold rounded-full focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-white/70 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'holo-btn',
        secondary: 'glass-soft text-violet-700/80 hover:bg-white/70 transition-colors',
        danger: 'holo-btn-danger',
        ghost: 'bg-transparent text-violet-600/80 hover:bg-white/50 transition-colors',
      };
      const sizes = {
        sm: 'px-3 py-1 text-sm',
        md: 'px-5 py-2 text-sm',
        lg: 'px-6 py-2.5 text-base',
      };
      return (
        <button
          type={type}
          disabled={disabled}
          onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Input({ label, value, onChange, placeholder, error, disabled, type = 'text', className = '', ...rest }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-semibold text-violet-700/80 mb-1.5 ml-1">{label}</label>}
          <input
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            disabled={disabled}
            className={`glass-input w-full rounded-2xl px-4 py-2.5 text-sm text-slate-700 disabled:opacity-60 ${
              error ? 'has-error' : ''
            }`}
            {...rest}
          />
          {error && <p className="mt-1.5 ml-1 text-xs text-rose-500/90">{error}</p>}
        </div>
      );
    }

    function Textarea({ label, value, onChange, placeholder, disabled, rows = 4, className = '' }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-semibold text-violet-700/80 mb-1.5 ml-1">{label}</label>}
          <textarea
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            disabled={disabled}
            rows={rows}
            className="glass-input w-full rounded-2xl px-4 py-2.5 text-sm text-slate-700 disabled:opacity-60 resize-y"
          />
        </div>
      );
    }

    function Card({ className = '', children }) {
      return (
        <div className={`glass rounded-3xl ${className}`}>
          {children}
        </div>
      );
    }

    function Spinner({ className = 'h-5 w-5' }) {
      return (
        <span
          className={`spinner inline-block rounded-full border-2 border-violet-200/70 border-t-violet-400 ${className}`}
          aria-hidden="true"
        />
      );
    }

    // ========================================
    // 🧩 상태/안내 컴포넌트
    // ========================================
    function LoadingState() {
      return (
        <div className="flex flex-col items-center justify-center py-16 text-violet-500/80 soft-pulse" role="status">
          <Spinner className="h-9 w-9" />
          <p className="mt-4 text-sm font-medium">구름 사이에서 메모를 불러오는 중...</p>
        </div>
      );
    }

    function ErrorState({ message, onRetry }) {
      return (
        <Card className="p-8 text-center">
          <div className="text-4xl mb-2">🌧️</div>
          <p className="text-violet-800/90 font-semibold">잠시 구름이 끼었어요</p>
          <p className="text-sm text-slate-500 mt-1">{message}</p>
          {onRetry && (
            <Button variant="secondary" className="mt-4" onClick={onRetry}>
              다시 시도
            </Button>
          )}
        </Card>
      );
    }

    function EmptyState({ searching }) {
      return (
        <Card className="p-12 text-center">
          <div className="text-5xl mb-3">{searching ? '🔍' : '☁️'}</div>
          <p className="text-violet-800/90 font-semibold">
            {searching ? '검색 결과가 없어요' : '아직 적어둔 메모가 없어요'}
          </p>
          <p className="text-sm text-slate-500 mt-1.5">
            {searching ? '다른 키워드로 검색해 보세요.' : '구름 위에 첫 메모를 살포시 남겨보세요.'}
          </p>
        </Card>
      );
    }

    // ========================================
    // 🧩 메모 작성 폼
    // ========================================
    function MemoForm({ onCreate }) {
      const [title, setTitle] = useState('');
      const [content, setContent] = useState('');
      const [error, setError] = useState('');
      const [saving, setSaving] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!title.trim()) {
          setError('제목을 입력해 주세요.');
          return;
        }
        setError('');
        setSaving(true);
        try {
          await onCreate({ title: title.trim(), content });
          setTitle('');
          setContent('');
        } catch (err) {
          setError(err.message || '저장에 실패했어요.');
        } finally {
          setSaving(false);
        }
      };

      return (
        <Card className="p-6 mb-8">
          <h2 className="text-lg font-bold holo-text mb-4">✨ 새 메모 적기</h2>
          <form onSubmit={handleSubmit} className="space-y-4">
            <Input
              label="제목"
              value={title}
              onChange={(e) => setTitle(e.target.value)}
              placeholder="제목을 입력하세요"
              error={error}
              disabled={saving}
            />
            <Textarea
              label="내용"
              value={content}
              onChange={(e) => setContent(e.target.value)}
              placeholder="내용을 입력하세요"
              disabled={saving}
            />
            <div className="flex justify-end">
              <Button type="submit" disabled={saving}>
                {saving ? (<><Spinner className="h-4 w-4 mr-2" /> 저장 중...</>) : '저장'}
              </Button>
            </div>
          </form>
        </Card>
      );
    }

    // ========================================
    // 🧩 메모 아이템 (보기 / 인라인 편집)
    // ========================================
    function MemoItem({ memo, onUpdate, onDelete }) {
      const [editing, setEditing] = useState(false);
      const [title, setTitle] = useState(memo.title);
      const [content, setContent] = useState(memo.content || '');
      const [error, setError] = useState('');
      const [busy, setBusy] = useState(false);

      const startEdit = () => {
        setTitle(memo.title);
        setContent(memo.content || '');
        setError('');
        setEditing(true);
      };

      const cancelEdit = () => {
        setEditing(false);
        setError('');
      };

      const saveEdit = async () => {
        if (!title.trim()) {
          setError('제목을 입력해 주세요.');
          return;
        }
        setBusy(true);
        try {
          await onUpdate(memo.id, { title: title.trim(), content });
          setEditing(false);
        } catch (err) {
          setError(err.message || '수정에 실패했어요.');
        } finally {
          setBusy(false);
        }
      };

      const handleDelete = async () => {
        if (!window.confirm('이 메모를 삭제할까요?')) return;
        setBusy(true);
        try {
          await onDelete(memo.id);
        } catch (err) {
          window.alert(err.message || '삭제에 실패했어요.');
          setBusy(false);
        }
      };

      if (editing) {
        return (
          <Card className="p-6">
            <div className="space-y-4">
              <Input
                label="제목"
                value={title}
                onChange={(e) => setTitle(e.target.value)}
                error={error}
                disabled={busy}
              />
              <Textarea
                label="내용"
                value={content}
                onChange={(e) => setContent(e.target.value)}
                disabled={busy}
              />
              <div className="flex justify-end gap-2">
                <Button variant="secondary" size="sm" onClick={cancelEdit} disabled={busy}>취소</Button>
                <Button size="sm" onClick={saveEdit} disabled={busy}>
                  {busy ? (<><Spinner className="h-4 w-4 mr-1" /> 저장 중</>) : '저장'}
                </Button>
              </div>
            </div>
          </Card>
        );
      }

      return (
        <Card className="p-6 flex flex-col card-float">
          <div className="flex items-start justify-between gap-3">
            <h3 className="text-lg font-bold text-violet-900/90 break-words flex-1">{memo.title}</h3>
          </div>
          {memo.content && (
            <p className="mt-2.5 text-sm text-slate-600/90 whitespace-pre-wrap line-clamp-3 leading-relaxed">{memo.content}</p>
          )}
          <div className="mt-5 flex items-center justify-between">
            <span className="text-xs text-violet-400/80 font-medium">{formatDate(memo.created_at)}</span>
            <div className="flex gap-2">
              <Button variant="ghost" size="sm" onClick={startEdit} disabled={busy}>수정</Button>
              <Button variant="danger" size="sm" onClick={handleDelete} disabled={busy}>삭제</Button>
            </div>
          </div>
        </Card>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const [memos, setMemos] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [searchInput, setSearchInput] = useState('');
      const [search, setSearch] = useState(''); // 디바운스된 검색어
      const debounceRef = useRef(null);

      // 검색어 디바운스 (300ms)
      useEffect(() => {
        if (debounceRef.current) clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(() => {
          setSearch(searchInput.trim());
        }, 300);
        return () => clearTimeout(debounceRef.current);
      }, [searchInput]);

      // 목록 조회
      const fetchMemos = useCallback(async (signal) => {
        setLoading(true);
        setError(null);
        try {
          const qs = search ? `?search=${encodeURIComponent(search)}` : '';
          const res = await fetch(`${API_BASE_URL}/memos${qs}`, { signal });
          if (!res.ok) throw new Error(`서버 오류 (${res.status})`);
          const data = await res.json();
          setMemos(Array.isArray(data) ? data : []);
        } catch (err) {
          if (err.name === 'AbortError') return;
          setError(err.message || '메모를 불러오지 못했어요.');
        } finally {
          setLoading(false);
        }
      }, [search]);

      useEffect(() => {
        const controller = new AbortController();
        fetchMemos(controller.signal);
        return () => controller.abort();
      }, [fetchMemos]);

      // 생성
      const handleCreate = async ({ title, content }) => {
        const res = await fetch(`${API_BASE_URL}/memos`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content }),
        });
        if (!res.ok) throw new Error(`저장 실패 (${res.status})`);
        await fetchMemos();
      };

      // 수정
      const handleUpdate = async (id, { title, content }) => {
        const res = await fetch(`${API_BASE_URL}/memos/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content }),
        });
        if (!res.ok) throw new Error(`수정 실패 (${res.status})`);
        const updated = await res.json();
        setMemos((prev) => prev.map((m) => (m.id === id ? { ...m, ...updated } : m)));
      };

      // 삭제
      const handleDelete = async (id) => {
        const res = await fetch(`${API_BASE_URL}/memos/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error(`삭제 실패 (${res.status})`);
        setMemos((prev) => prev.filter((m) => m.id !== id));
      };

      return (
        <div className="min-h-screen">
          <header className="glass-soft sticky top-0 z-20 border-b border-white/40">
            <div className="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between gap-4">
              <h1 className="text-2xl font-extrabold holo-text tracking-tight">☁️ 구름 메모장</h1>
              <div className="w-48 sm:w-64">
                <Input
                  value={searchInput}
                  onChange={(e) => setSearchInput(e.target.value)}
                  placeholder="메모 검색..."
                  aria-label="메모 검색"
                />
              </div>
            </div>
          </header>

          <main className="max-w-3xl mx-auto px-4 py-8">
            <MemoForm onCreate={handleCreate} />

            <div className="flex items-center justify-between mb-4">
              <h2 className="text-sm font-bold text-violet-600/80 ml-1">
                {search ? `"${search}" 검색 결과` : '전체 메모'}
                {!loading && !error && ` (${memos.length})`}
              </h2>
            </div>

            {loading ? (
              <LoadingState />
            ) : error ? (
              <ErrorState message={error} onRetry={() => fetchMemos()} />
            ) : memos.length === 0 ? (
              <EmptyState searching={!!search} />
            ) : (
              <div className="grid gap-5 sm:grid-cols-2">
                {memos.map((memo) => (
                  <MemoItem
                    key={memo.id}
                    memo={memo}
                    onUpdate={handleUpdate}
                    onDelete={handleDelete}
                  />
                ))}
              </div>
            )}
          </main>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
