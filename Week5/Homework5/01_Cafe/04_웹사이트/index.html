  <script>
  (() => {
    const root = document.getElementById('intro');
    if(!root) return;
    const cv = document.getElementById('introCv');
    const ctx = cv.getContext('2d',{alpha:false});
    const WORD="QUARTER";
    const NOISE="01<>/\\|[]{}*+=-_:.#%&$@QUARTER01".split("");
    const DUR=2000;
    let W,H,cell,cols,rows,mask,settle,dpr,start=performance.now(),raf=0,closing=false;
    const rand=a=>a[(Math.random()*a.length)|0];

    function build(){
      dpr=Math.min(window.devicePixelRatio||1,2);
      W=innerWidth;H=innerHeight;
      cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
      cell=Math.max(9,Math.round(Math.min(W,H)/64));
      cols=Math.ceil(W/cell);rows=Math.ceil(H/cell);
      const off=document.createElement('canvas');off.width=cols;off.height=rows;
      const o=off.getContext('2d');o.fillStyle='#000';o.fillRect(0,0,cols,rows);
      o.fillStyle='#fff';o.textAlign='center';o.textBaseline='middle';
      let fs=rows*0.42;o.font=`900 ${fs}px "Arial Black",Arial,sans-serif`;
      fs=Math.min(fs*(cols*0.84/o.measureText(WORD).width),rows*0.6);
      o.font=`900 ${fs}px "Arial Black",Arial,sans-serif`;o.fillText(WORD,cols/2,rows/2);
      const d=o.getImageData(0,0,cols,rows).data;
      mask=new Uint8Array(cols*rows);settle=new Float32Array(cols*rows);
      let minX=cols,maxX=0;
      for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){if(d[(y*cols+x)*4]>110){mask[y*cols+x]=1;if(x<minX)minX=x;if(x>maxX)maxX=x;}}
      const span=Math.max(1,maxX-minX);
      for(let y=0;y<rows;y++)for(let x=0;x<cols;x++)settle[y*cols+x]=0.18+0.62*((x-minX)/span)+Math.random()*0.12;
    }
    function draw(now){
      let p=(now-start)/DUR;if(p>1)p=1;
      const ease=p<0.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
      ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
      ctx.font=`${cell}px Menlo,Consolas,monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
      const glAmp=Math.sin(p*Math.PI);
      const slices=[];const n=(Math.random()<0.5)?(1+(Math.random()*3|0)):0;
      for(let s=0;s<n;s++)slices.push([Math.random()*rows|0,(Math.random()*8|0)-4,2+(Math.random()*4|0)]);
      const so=y=>{for(const[yy,dx,hh]of slices)if(y>=yy&&y<yy+hh)return dx*glAmp;return 0;};
      for(let y=0;y<rows;y++){const ox=so(y)*cell;
        for(let x=0;x<cols;x++){const i=y*cols+x;const word=mask[i]===1;let ch,a;
          if(word){const st=settle[i];
            if(ease<st){ch=rand(NOISE);a=0.25+Math.random()*0.5;}
            else{ch=(Math.random()<0.04&&p<1)?rand(NOISE):'█';a=0.85+Math.random()*0.15;}
          }else{const base=1-ease;if(Math.random()>base*0.9)continue;ch=rand(NOISE);a=0.06+Math.random()*0.3;}
          const px=x*cell+cell/2+ox,py=y*cell+cell/2;
          if(glAmp>0.4&&word&&Math.random()<0.25){ctx.fillStyle=`rgba(255,255,255,${a*0.25})`;ctx.fillText(ch,px+2,py);}
          ctx.fillStyle=`rgba(245,245,247,${a})`;ctx.fillText(ch,px,py);
        }}
      if(p>=1&&!closing){closing=true;setTimeout(close,260);}
    }
    let last=0;
    function loop(now){raf=requestAnimationFrame(loop);if(now-last<16)return;last=now;draw(now);}
    function close(){
      root.classList.add('hide');
      setTimeout(()=>{cancelAnimationFrame(raf);root.remove();},650);
    }
    addEventListener('resize',()=>{if(!closing)build();});
    root.addEventListener('click',()=>{if(!closing){closing=true;close();}});
    build();raf=requestAnimationFrame(loop);
  })();
  </script>

    const ReservePage = () => {
      const [list, setList] = useState([]);
      const [form, setForm] = useState({ name: "", phone: "", date: "", time: "", people: "2", note: "" });
      const [errors, setErrors] = useState({});

      // 로드
      useEffect(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) setList(JSON.parse(raw));
        } catch (e) { console.warn("load failed", e); }
      }, []);

      // 저장
      const persist = (next) => {
        setList(next);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); }
        catch (e) { console.warn("save failed", e); }
      };

      const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));

      const validate = () => {
        const err = {};
        if (!form.name.trim()) err.name = "이름을 입력해 주세요.";
        if (!/^[0-9\-]{8,15}$/.test(form.phone.trim())) err.phone = "올바른 연락처를 입력해 주세요.";
        if (!form.date) err.date = "방문 날짜를 선택해 주세요.";
        if (!form.time) err.time = "방문 시간을 선택해 주세요.";
        setErrors(err);
        return Object.keys(err).length === 0;
      };

      const submit = (e) => {
        e.preventDefault();
        if (!validate()) return;
        const entry = {
          id: Date.now(),
          ...form,
          name: form.name.trim(),
          phone: form.phone.trim(),
          note: form.note.trim(),
          createdAt: new Date().toLocaleString("ko-KR", { dateStyle: "short", timeStyle: "short" }),
        };
        persist([entry, ...list]);
        setForm({ name: "", phone: "", date: "", time: "", people: "2", note: "" });
        setErrors({});
      };

      const remove = (id) => persist(list.filter((r) => r.id !== id));

      const today = new Date().toISOString().slice(0, 10);

      return (
        <div className="q-fade-in mx-auto max-w-6xl px-5 py-16">
          <SectionTitle center pill="RESERVATION" title="방문 예약"
            desc="원하시는 날짜와 시간에 방문 예약을 남겨주세요. 예약 내역은 이 브라우저에 저장되어 새로고침해도 유지됩니다." />

          <div className="mt-12 grid gap-8 lg:grid-cols-5">
            {/* 폼 */}
            <Card className="p-7 lg:col-span-2">
              <h3 className="text-lg font-bold text-white/95">예약 신청</h3>
              <form onSubmit={submit} className="mt-5 space-y-4">
                <Field label="이름" required error={errors.name}>
                  <Input value={form.name} onChange={set("name")} placeholder="홍길동" />
                </Field>
                <Field label="연락처" required error={errors.phone}>
                  <Input value={form.phone} onChange={set("phone")} placeholder="010-0000-0000" inputMode="tel" />
                </Field>
                <div className="grid grid-cols-2 gap-3">
                  <Field label="날짜" required error={errors.date}>
                    <Input type="date" min={today} value={form.date} onChange={set("date")} />
                  </Field>
                  <Field label="시간" required error={errors.time}>
                    <Select value={form.time} onChange={set("time")}>
                      <option value="">선택</option>
                      {TIMES.map((t) => <option key={t} value={t}>{t}</option>)}
                    </Select>
                  </Field>
                </div>
                <Field label="인원수">
                  <Select value={form.people} onChange={set("people")}>
                    {[1,2,3,4,5,6,7,8].map((n) => <option key={n} value={n}>{n}명</option>)}
                    <option value="9+">9명 이상</option>
                  </Select>
                </Field>
                <Field label="요청사항">
                  <Textarea rows={3} value={form.note} onChange={set("note")} placeholder="창가 자리 희망, 기념일 방문 등" />
                </Field>
                <Button type="submit" size="lg" className="w-full">예약 신청하기</Button>
              </form>
            </Card>

            {/* 게시판 */}
            <div className="lg:col-span-3">
              <div className="mb-4 flex items-center justify-between">
                <h3 className="text-lg font-bold text-white/95">예약 현황</h3>
                <span className="rounded-full border border-white/10 bg-white/5 px-3 py-1 text-xs text-white/50">
                  총 {list.length}건
                </span>
              </div>

              {list.length === 0 ? (
                <Card className="flex flex-col items-center justify-center gap-3 p-14 text-center">
                  <QLogo size={56} className="opacity-40" />
                  <p className="text-white/40">아직 예약이 없습니다.</p>
                  <p className="text-sm text-white/30">왼쪽 폼에서 첫 예약을 남겨보세요.</p>
                </Card>
              ) : (
                <div className="space-y-3">
                  {list.map((r) => (
                    <Card key={r.id} hover className="flex items-start justify-between gap-4 p-5">
                      <div className="min-w-0">
                        <div className="flex flex-wrap items-center gap-2">
                          <span className="font-semibold text-white/95">{r.name}</span>
                          <span className="rounded-md bg-cyan-400/15 px-2 py-0.5 text-xs text-cyan-200">{r.people}명</span>
                        </div>
                        <div className="mt-2 flex flex-wrap items-center gap-x-4 gap-y-1 text-sm text-white/55">
                          <span className="inline-flex items-center gap-1.5"><IconClock className="h-4 w-4" /> {r.date} {r.time}</span>
                          <span className="text-white/40">{r.phone}</span>
                        </div>
                        {r.note && <p className="mt-2 text-sm text-white/40">“{r.note}”</p>}
                        <p className="mt-1.5 text-xs text-white/25">신청 {r.createdAt}</p>
                      </div>
                      <Button variant="danger" size="sm" onClick={() => remove(r.id)} aria-label="예약 삭제">
                        <IconTrash className="h-4 w-4" />
                      </Button>
                    </Card>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // ========================================
    // 📄 Page — Location
    // ========================================
    const LocationPage = () => {
      const mapEmbed = "https://www.google.com/maps?q=" + encodeURIComponent(BRAND.mapQuery) + "&output=embed";
      const naverDir = "https://map.naver.com/p/directions/-/-/-/walk?c=" +
                       "&query=" + encodeURIComponent("성수동 쿼터 카페");
      return (
        <div className="q-fade-in mx-auto max-w-7xl px-5 py-16">
          <SectionTitle center pill="LOCATION" title="오시는 길"
            desc="서울 성동구 성수동, 카페거리 한가운데에 QUARTER가 있습니다." />

          <div className="mt-12 grid gap-8 lg:grid-cols-3">
            {/* 지도 */}
            <Card className="overflow-hidden p-0 lg:col-span-2">
              <iframe
                title="QUARTER 위치 지도"
                src={mapEmbed}
                className="h-[420px] w-full border-0"
                loading="lazy"
                referrerPolicy="no-referrer-when-downgrade"
                allowFullScreen />
            </Card>

            {/* 정보 */}
            <div className="space-y-5">
              <Card className="p-6">
                <div className="flex items-center gap-2 text-cyan-300"><IconPin className="h-5 w-5" /><span className="font-semibold">주소</span></div>
                <p className="mt-2 text-sm leading-relaxed text-white/70">{BRAND.address}</p>
                <p className="mt-1 text-xs text-white/35">2호선 성수역 3번 출구 도보 6분</p>
              </Card>

              <Card className="p-6">
                <div className="flex items-center gap-2 text-cyan-300"><IconClock className="h-5 w-5" /><span className="font-semibold">영업시간</span></div>
                <ul className="mt-3 space-y-2">
                  {BRAND.hours.map((h) => (
                    <li key={h.d} className="flex justify-between text-sm">
                      <span className="text-white/50">{h.d}</span>
                      <span className="font-medium text-white/85">{h.t}</span>
                    </li>
                  ))}
                </ul>
              </Card>

              <Card className="p-6">
                <p className="text-sm font-semibold text-white/80">길찾기 / SNS</p>
                <a href={BRAND.social.naverMap} target="_blank" rel="noreferrer"
                   className="mt-3 flex items-center justify-between rounded-xl border border-green-500/30 bg-green-500/10 px-4 py-3 text-sm font-medium text-green-300 transition hover:bg-green-500/20">
                  <span className="inline-flex items-center gap-2"><IconNaverMap className="h-5 w-5" /> 네이버 지도로 보기</span>
                  <IconArrow className="h-4 w-4" />
                </a>
                <a href={naverDir} target="_blank" rel="noreferrer"
                   className="mt-2.5 flex items-center justify-between rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-sm font-medium text-white/80 transition hover:bg-white/10">
                  <span className="inline-flex items-center gap-2"><IconPin className="h-5 w-5" /> 네이버 길찾기</span>
                  <IconArrow className="h-4 w-4" />
                </a>
                <div className="mt-4 flex gap-2">
                  <a href={BRAND.social.instagram} target="_blank" rel="noreferrer"
                     className="flex flex-1 items-center justify-center gap-2 rounded-xl border border-white/10 bg-white/5 py-2.5 text-sm text-white/70 transition hover:text-cyan-300 hover:bg-white/10">
                    <IconInstagram className="h-4 w-4" /> 인스타
                  </a>
                  <a href={BRAND.social.threads} target="_blank" rel="noreferrer"
                     className="flex flex-1 items-center justify-center gap-2 rounded-xl border border-white/10 bg-white/5 py-2.5 text-sm text-white/70 transition hover:text-cyan-300 hover:bg-white/10">
                    <IconThreads className="h-4 w-4" /> 스레드
                  </a>
                </div>
              </Card>
            </div>
          </div>
        </div>
      );
    };

    // ========================================
    // 📄 404
    // ========================================
    const NotFound = () => {
      const { navigate } = useRouter();
      return (
        <div className="q-fade-in mx-auto flex max-w-3xl flex-col items-center px-5 py-32 text-center">
          <QLogo size={72} className="opacity-50" />
          <h1 className="mt-6 text-4xl font-extrabold q-metal">페이지를 찾을 수 없습니다</h1>
          <p className="mt-3 text-white/45">요청하신 페이지가 존재하지 않습니다.</p>
          <Button className="mt-8" size="lg" onClick={() => navigate("/")}>홈으로 돌아가기</Button>
        </div>
      );
    };

    // ========================================
    // 🚀 App
    // ========================================
    const Routes = () => {
      const { path } = useRouter();
      switch (path) {
        case "/":         return <HomePage />;
        case "/menu":     return <MenuPage />;
        case "/event":    return <EventPage />;
        case "/reserve":  return <ReservePage />;
        case "/location": return <LocationPage />;
        default:          return <NotFound />;
      }
    };

    const App = () => (
      <Router>
        <div className="q-bg min-h-screen">
          <Header />
          <main><Routes /></main>
          <Footer />
        </div>
      </Router>
    );

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
