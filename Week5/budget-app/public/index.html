<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나만의 가계부</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <!-- ⚠️ CDN 버전 고정. @babel/standalone 은 반드시 v7 (8.x 는 text/babel 인라인 변환을 깨뜨림). -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  <style>
    /* ===== 블랙 & 그레이 모노크롬 (참고: 미니멀 흑백 포스터/다이어그램) ===== */
    :root { font-family: 'Inter', 'Gowun Dodum', system-ui, sans-serif; }
    body {
      font-family: 'Inter', 'Gowun Dodum', system-ui, sans-serif;
      background: #000;
      color: #ededed;
      overflow-x: hidden;
    }
    /* 상단 이클립스 글로우 */
    .glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(120% 60% at 50% -28%, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.06) 26%, rgba(255,255,255,0) 52%);
    }
    /* 미세한 + 격자 마크 */
    .grid-marks {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .5;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(120% 90% at 50% 0%, #000 0%, transparent 75%);
      -webkit-mask-image: radial-gradient(120% 90% at 50% 0%, #000 0%, transparent 75%);
    }
    .card { background: rgba(13,13,13,.92); border: 1px solid #242424; border-radius: 14px; }
    .bar { transition: width .5s cubic-bezier(.22,.61,.36,1); }
    input, select { color-scheme: dark; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 8px; }
    .tracking-wider2 { letter-spacing: .12em; }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="grid-marks"></div>
  <div id="root" style="position:relative;z-index:1"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useCallback } = React;

    const won = (n) => (Number(n) || 0).toLocaleString('ko-KR') + '원';
    const todayStr = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };
    const thisMonth = () => todayStr().slice(0, 7);

    // 카테고리 막대: 순위에 따른 그레이 램프 (밝은 흰색 → 짙은 회색)
    const greyByRank = (i, n) => {
      const top = 90, bottom = 36;
      const L = n <= 1 ? top : Math.round(top - (top - bottom) * (i / (n - 1)));
      return `hsl(0 0% ${L}%)`;
    };

    async function api(method, url, body) {
      const res = await fetch(url, {
        method,
        headers: body ? { 'Content-Type': 'application/json' } : undefined,
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `요청 실패 (${res.status})`);
      return data;
    }

    function StatCard({ label, value, bright }) {
      return (
        <div className="card p-5">
          <div className="text-[11px] uppercase tracking-wider2 text-neutral-500">{label}</div>
          <div className={'mt-1 text-2xl font-extrabold ' + (bright ? 'text-white' : 'text-neutral-400')}>{won(value)}</div>
        </div>
      );
    }

    function Bar({ label, value, max, color, sub }) {
      const pct = max > 0 ? Math.round((value / max) * 100) : 0;
      return (
        <div className="mb-3">
          <div className="flex justify-between text-sm mb-1">
            <span className="font-medium text-neutral-200">{label}</span>
            <span className="text-neutral-300">{won(value)} <span className="text-neutral-600">{sub}</span></span>
          </div>
          <div className="h-2 rounded-full bg-neutral-900 overflow-hidden border border-neutral-800">
            <div className="bar h-full rounded-full" style={{ width: pct + '%', background: color }} />
          </div>
        </div>
      );
    }

    function App() {
      const [month, setMonth] = useState(thisMonth());
      const [categories, setCategories] = useState([]);
      const [entries, setEntries] = useState([]);
      const [catSummary, setCatSummary] = useState([]);
      const [monthly, setMonthly] = useState([]);
      const [totals, setTotals] = useState({ income: 0, expense: 0, balance: 0 });
      const [err, setErr] = useState('');
      const [editingId, setEditingId] = useState(null);

      const empty = { type: 'expense', date: todayStr(), category: '식비', amount: '', memo: '' };
      const [form, setForm] = useState(empty);

      const load = useCallback(async () => {
        try {
          setErr('');
          const [e, c, m, t] = await Promise.all([
            api('GET', `/api/entries?month=${month}`),
            api('GET', `/api/summary/category?month=${month}&type=expense`),
            api('GET', `/api/summary/monthly`),
            api('GET', `/api/summary/totals?month=${month}`),
          ]);
          setEntries(e); setCatSummary(c); setMonthly(m); setTotals(t);
        } catch (e) { setErr(e.message); }
      }, [month]);

      useEffect(() => { api('GET', '/api/categories').then(setCategories).catch(() => {}); }, []);
      useEffect(() => { load(); }, [load]);

      const submit = async (ev) => {
        ev.preventDefault();
        try {
          setErr('');
          const payload = { ...form, amount: Number(form.amount) };
          if (editingId) await api('PUT', `/api/entries/${editingId}`, payload);
          else await api('POST', '/api/entries', payload);
          setForm({ ...empty, type: form.type, date: form.date });
          setEditingId(null);
          load();
        } catch (e) { setErr(e.message); }
      };

      const startEdit = (en) => {
        setEditingId(en.id);
        setForm({ type: en.type, date: en.date, category: en.category, amount: String(en.amount), memo: en.memo });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      const cancelEdit = () => { setEditingId(null); setForm(empty); };
      const remove = async (id) => {
        if (!confirm('이 내역을 삭제할까요?')) return;
        try { await api('DELETE', `/api/entries/${id}`); load(); } catch (e) { setErr(e.message); }
      };

      const catMax = useMemo(() => Math.max(1, ...catSummary.map((c) => c.total)), [catSummary]);
      const monMax = useMemo(() => Math.max(1, ...monthly.map((m) => Math.max(m.income, m.expense))), [monthly]);

      // 예산 대비 사용량 (월별, localStorage)
      const [budget, setBudget] = useState('');
      useEffect(() => { setBudget(localStorage.getItem('budget:' + month) || ''); }, [month]);
      const saveBudget = (v) => { setBudget(v); if (v) localStorage.setItem('budget:' + month, v); else localStorage.removeItem('budget:' + month); };
      const budgetNum = Number(budget) || 0;
      const usePct = budgetNum > 0 ? Math.round((totals.expense / budgetNum) * 100) : 0;
      const over = budgetNum > 0 && totals.expense > budgetNum;

      const monthLabel = (m) => `${m.split('-')[0]}.${m.split('-')[1]}`;

      return (
        <div className="max-w-3xl mx-auto px-4 py-10">
          <header className="flex items-end justify-between mb-8">
            <div>
              <div className="text-[11px] uppercase tracking-wider2 text-neutral-500 mb-1">PERSONAL LEDGER</div>
              <h1 className="text-3xl font-extrabold tracking-tight text-white">나만의 가계부</h1>
            </div>
            <input type="month" value={month} onChange={(e) => setMonth(e.target.value)}
              className="card px-3 py-2 text-sm bg-transparent outline-none text-neutral-200" />
          </header>

          {err && <div className="mb-4 rounded-xl border border-neutral-700 bg-neutral-900 text-neutral-200 px-4 py-3 text-sm">{err}</div>}

          {/* 요약 카드 */}
          <div className="grid grid-cols-3 gap-3 mb-6">
            <StatCard label="이번 달 수입" value={totals.income} bright />
            <StatCard label="이번 달 지출" value={totals.expense} />
            <StatCard label="잔액" value={totals.balance} bright />
          </div>

          {/* 등록/수정 폼 */}
          <form onSubmit={submit} className="card p-5 mb-6">
            <div className="flex gap-2 mb-3">
              {['expense', 'income'].map((t) => (
                <button type="button" key={t} onClick={() => setForm({ ...form, type: t })}
                  className={'flex-1 py-2 rounded-xl text-sm font-semibold transition border ' +
                    (form.type === t
                      ? 'bg-white text-black border-white'
                      : 'bg-neutral-950 text-neutral-400 border-neutral-800 hover:border-neutral-600')}>
                  {t === 'expense' ? '지출' : '수입'}
                </button>
              ))}
            </div>
            <div className="grid grid-cols-2 gap-3">
              <input type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })}
                className="card px-3 py-2 bg-transparent outline-none text-sm text-neutral-200" required />
              <select value={form.category} onChange={(e) => setForm({ ...form, category: e.target.value })}
                className="card px-3 py-2 bg-[#0d0d0d] outline-none text-sm text-neutral-200">
                {categories.map((c) => <option key={c} value={c}>{c}</option>)}
              </select>
              <input type="number" min="0" step="1" inputMode="numeric" placeholder="금액"
                value={form.amount} onChange={(e) => setForm({ ...form, amount: e.target.value })}
                className="card px-3 py-2 bg-transparent outline-none text-sm text-neutral-200 placeholder-neutral-600" required />
              <input type="text" placeholder="메모 (선택)" value={form.memo}
                onChange={(e) => setForm({ ...form, memo: e.target.value })}
                className="card px-3 py-2 bg-transparent outline-none text-sm text-neutral-200 placeholder-neutral-600" />
            </div>
            <div className="flex gap-2 mt-3">
              <button type="submit"
                className="flex-1 py-2.5 rounded-xl font-semibold bg-white text-black hover:bg-neutral-200 transition">
                {editingId ? '수정 저장' : '등록'}
              </button>
              {editingId && (
                <button type="button" onClick={cancelEdit}
                  className="px-4 py-2.5 rounded-xl font-semibold bg-neutral-900 border border-neutral-700 text-neutral-300 hover:border-neutral-500 transition">취소</button>
              )}
            </div>
          </form>

          {/* 예산 대비 사용량 */}
          <div className="card p-5 mb-6">
            <div className="flex items-center justify-between mb-3">
              <h2 className="font-bold text-neutral-100">예산 대비 사용량</h2>
              <div className="flex items-center gap-2 text-sm">
                <span className="text-neutral-500">월 예산</span>
                <input type="number" min="0" placeholder="예: 1500000" value={budget}
                  onChange={(e) => saveBudget(e.target.value)}
                  className="card px-2 py-1 w-32 bg-transparent outline-none text-right text-neutral-200 placeholder-neutral-600" />
              </div>
            </div>
            {budgetNum > 0 ? (
              <>
                <div className="h-3 rounded-full bg-neutral-900 overflow-hidden border border-neutral-800">
                  <div className="bar h-full rounded-full" style={{ width: Math.min(100, usePct) + '%', background: over ? '#ffffff' : '#a3a3a3' }} />
                </div>
                <div className="mt-2 text-sm flex justify-between">
                  <span className={over ? 'text-white font-semibold' : 'text-neutral-300'}>
                    {won(totals.expense)} / {won(budgetNum)} ({usePct}%)
                  </span>
                  <span className="text-neutral-500">
                    {over ? `예산 초과 ${won(totals.expense - budgetNum)}` : `남은 예산 ${won(budgetNum - totals.expense)}`}
                  </span>
                </div>
              </>
            ) : (
              <p className="text-sm text-neutral-600">월 예산을 입력하면 사용량을 보여줍니다. (브라우저에 저장)</p>
            )}
          </div>

          {/* 카테고리별 지출 합계 */}
          <div className="card p-5 mb-6">
            <h2 className="font-bold mb-4 text-neutral-100">카테고리별 지출 합계 <span className="text-neutral-600 text-sm">({month})</span></h2>
            {catSummary.length === 0 ? (
              <p className="text-sm text-neutral-600">이번 달 지출 내역이 없습니다.</p>
            ) : (
              catSummary.map((c, i) => (
                <Bar key={c.category} label={c.category} value={c.total} max={catMax}
                  color={greyByRank(i, catSummary.length)} sub={`· ${c.count}건`} />
              ))
            )}
          </div>

          {/* 월별 수입/지출 차트 */}
          <div className="card p-5 mb-6">
            <h2 className="font-bold mb-4 text-neutral-100">월별 수입 · 지출</h2>
            {monthly.length === 0 ? (
              <p className="text-sm text-neutral-600">데이터가 없습니다.</p>
            ) : (
              <div className="flex items-end gap-3 overflow-x-auto pb-2" style={{ height: 180 }}>
                {monthly.map((m) => (
                  <div key={m.month} className="flex flex-col items-center justify-end gap-1 min-w-[48px]">
                    <div className="flex items-end gap-1 h-[130px]">
                      <div className="bar w-3 rounded-t bg-white" style={{ height: Math.round((m.income / monMax) * 120) + 'px' }} title={'수입 ' + won(m.income)} />
                      <div className="bar w-3 rounded-t bg-neutral-600" style={{ height: Math.round((m.expense / monMax) * 120) + 'px' }} title={'지출 ' + won(m.expense)} />
                    </div>
                    <span className="text-[11px] text-neutral-500">{monthLabel(m.month)}</span>
                  </div>
                ))}
              </div>
            )}
            <div className="flex gap-4 mt-2 text-xs text-neutral-500">
              <span className="inline-flex items-center gap-1"><i className="w-2.5 h-2.5 rounded-sm bg-white inline-block"></i>수입</span>
              <span className="inline-flex items-center gap-1"><i className="w-2.5 h-2.5 rounded-sm bg-neutral-600 inline-block"></i>지출</span>
            </div>
          </div>

          {/* 내역 목록 */}
          <div className="card p-5">
            <h2 className="font-bold mb-4 text-neutral-100">내역 <span className="text-neutral-600 text-sm">({entries.length}건)</span></h2>
            {entries.length === 0 ? (
              <p className="text-sm text-neutral-600">등록된 내역이 없습니다. 위에서 추가해보세요.</p>
            ) : (
              <ul className="divide-y divide-neutral-900">
                {entries.map((en) => (
                  <li key={en.id} className="py-3 flex items-center gap-3">
                    <span className="w-1.5 h-10 rounded-full" style={{ background: en.type === 'income' ? '#f5f5f5' : '#4a4a4a' }} />
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2">
                        <span className="text-sm font-semibold text-neutral-100">{en.category}</span>
                        <span className="text-[11px] px-1.5 py-0.5 rounded-md border"
                          style={{ borderColor: '#3a3a3a', color: en.type === 'income' ? '#f5f5f5' : '#8f8f8f' }}>
                          {en.type === 'income' ? '수입' : '지출'}
                        </span>
                      </div>
                      <div className="text-xs text-neutral-500 truncate">{en.date}{en.memo ? ' · ' + en.memo : ''}</div>
                    </div>
                    <div className={'text-sm font-bold whitespace-nowrap ' + (en.type === 'income' ? 'text-white' : 'text-neutral-400')}>
                      {en.type === 'income' ? '+' : '-'}{won(en.amount)}
                    </div>
                    <div className="flex gap-1">
                      <button onClick={() => startEdit(en)} className="text-xs px-2 py-1 rounded-lg bg-neutral-900 border border-neutral-800 text-neutral-300 hover:border-neutral-600">수정</button>
                      <button onClick={() => remove(en.id)} className="text-xs px-2 py-1 rounded-lg bg-neutral-900 border border-neutral-800 text-neutral-300 hover:bg-white hover:text-black hover:border-white transition">삭제</button>
                    </div>
                  </li>
                ))}
              </ul>
            )}
          </div>

          <footer className="text-center text-[11px] uppercase tracking-wider2 text-neutral-700 mt-10">
            Express + Supabase · GROUP BY summary
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
