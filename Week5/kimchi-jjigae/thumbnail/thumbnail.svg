<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffcf9e"/>
      <stop offset="1" stop-color="#f07a4f"/>
    </linearGradient>
    <radialGradient id="broth" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#e8512a"/>
      <stop offset="1" stop-color="#b22d12"/>
    </radialGradient>
    <linearGradient id="pot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b4a3a"/>
      <stop offset="1" stop-color="#3f2a20"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- steam -->
  <g fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.5">
    <path d="M330 250 q-30 -40 0 -80 q30 -40 0 -80"/>
    <path d="M430 235 q-30 -40 0 -80 q30 -40 0 -80"/>
    <path d="M520 255 q-30 -40 0 -80 q30 -40 0 -80"/>
  </g>

  <!-- pot shadow -->
  <ellipse cx="400" cy="650" rx="290" ry="48" fill="#000000" opacity="0.18"/>

  <!-- earthenware pot (ttukbaegi) -->
  <path d="M140 420 a260 260 0 0 0 520 0 Z" fill="url(#pot)"/>
  <!-- handles -->
  <ellipse cx="130" cy="430" rx="34" ry="26" fill="#5a3c2e"/>
  <ellipse cx="670" cy="430" rx="34" ry="26" fill="#5a3c2e"/>
  <!-- rim -->
  <ellipse cx="400" cy="420" rx="262" ry="82" fill="#7a5544"/>
  <ellipse cx="400" cy="420" rx="262" ry="82" fill="none" stroke="#8a6450" stroke-width="7"/>

  <!-- broth surface -->
  <ellipse cx="400" cy="418" rx="238" ry="70" fill="url(#broth)"/>

  <!-- oil sheen specks -->
  <g fill="#ff8a4a" opacity="0.6">
    <circle cx="300" cy="396" r="7"/>
    <circle cx="470" cy="404" r="9"/>
    <circle cx="360" cy="440" r="6"/>
    <circle cx="510" cy="430" r="5"/>
  </g>

  <!-- kimchi pieces -->
  <g>
    <ellipse cx="320" cy="398" rx="34" ry="16" fill="#a31f10" transform="rotate(-16 320 398)"/>
    <ellipse cx="470" cy="392" rx="30" ry="15" fill="#8f1b0e" transform="rotate(20 470 392)"/>
    <ellipse cx="262" cy="426" rx="26" ry="13" fill="#9c1d0f" transform="rotate(-28 262 426)"/>
    <ellipse cx="540" cy="430" rx="24" ry="12" fill="#871a0d" transform="rotate(16 540 430)"/>
  </g>

  <!-- tofu cubes -->
  <g>
    <rect x="356" y="372" width="62" height="44" rx="6" fill="#fbf3df"/>
    <rect x="356" y="372" width="62" height="44" rx="6" fill="none" stroke="#e8dcbf" stroke-width="3"/>
    <rect x="430" y="420" width="54" height="38" rx="6" fill="#f7eed6"/>
    <rect x="430" y="420" width="54" height="38" rx="6" fill="none" stroke="#e8dcbf" stroke-width="3"/>
  </g>

  <!-- pork bits -->
  <ellipse cx="300" cy="430" rx="22" ry="11" fill="#d98c6a"/>
  <ellipse cx="300" cy="427" rx="22" ry="5" fill="#f0c4ac"/>

  <!-- scallion rings -->
  <g fill="#2f8a3c">
    <circle cx="345" cy="404" r="9"/><circle cx="345" cy="404" r="4" fill="#dff5e1"/>
    <circle cx="500" cy="412" r="9"/><circle cx="500" cy="412" r="4" fill="#dff5e1"/>
    <circle cx="408" cy="446" r="8"/><circle cx="408" cy="446" r="3.5" fill="#dff5e1"/>
  </g>

  <!-- red chili slices -->
  <g fill="#e23b1e">
    <circle cx="430" cy="392" r="8"/><circle cx="430" cy="392" r="3.5" fill="#ffd9c4"/>
    <circle cx="280" cy="408" r="7"/><circle cx="280" cy="408" r="3" fill="#ffd9c4"/>
  </g>

  <!-- title -->
  <text x="400" y="735" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="74" font-weight="800" fill="#3a1a10">김치찌개</text>
</svg>
